# 每周自动爬取MCPE资源并部署到GitHub Pages
name: 每周MCPE资源更新

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  crawl-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
      
      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 执行爬虫抓取
        run: python scripts/crawler.py
        env:
          USER_AGENT: "Mozilla/5.0 (compatible; MCPE-Crawler/1.0)"
      
      - name: 处理网站数据
        run: python scripts/update_site.py
      
      # ✅ 新增：验证生成的文件
      - name: 验证数据文件
        run: |
          echo "📁 检查 data 目录："
          ls -la data/
          echo ""
          echo "📄 site_data.json 统计："
          if [ -f data/site_data.json ]; then
            echo "文件大小: $(wc -c < data/site_data.json) 字节"
            echo "资源数量: $(grep -o '"name"' data/site_data.json | wc -l)"
          else
            echo "❌ site_data.json 不存在！"
            exit 1
          fi
      
      - name: 检查数据更新
        id: check_changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ 没有新数据更新"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 检测到数据更新"
          fi
      
      - name: 提交数据更新
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "🤖 自动更新MCPE资源数据 $(date '+%Y-%m-%d')"
          git push
      
      - name: 配置Pages
        uses: actions/configure-pages@v5
      
      - name: 上传Pages产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

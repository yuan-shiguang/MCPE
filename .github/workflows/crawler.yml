name: MCPE资源自动爬取与更新

# 触发条件
on:
  # 定时触发：每天凌晨2点运行（UTC时间，对应北京时间10点）
  schedule:
    - cron: '0 2 * * *'
  
  # 手动触发：方便测试
  workflow_dispatch:
  
  # 当推送代码到main分支时也触发（可选）
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

# 权限设置
permissions:
  contents: write
  pages: write
  id-token: write

# 任务定义
jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4
      
      # 2. 设置Python环境
      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存pip依赖加速构建
      
      # 3. 安装依赖
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 运行爬虫抓取数据
      - name: 执行爬虫抓取
        run: python scripts/crawler.py
        env:
          # 如果需要API密钥，从GitHub Secrets获取
          API_KEY: ${{ secrets.API_KEY }}
          # 可以设置代理等环境变量
          USER_AGENT: "Mozilla/5.0 (compatible; MCPE-Crawler/1.0)"
      
      # 5. 更新网站数据（如果需要额外处理）
      - name: 处理并更新网站数据
        run: python scripts/update_site.py
      
      # 6. 检查data目录是否有变化
      - name: 检查数据更新
        id: check_changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ 没有新数据更新"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 检测到数据更新"
          fi
      
      # 7. 提交更新后的数据到仓库
      - name: 提交数据更新
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "🤖 自动更新MCPE资源数据 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
      
      # 8. 部署到GitHub Pages（可选）
      - name: 部署到GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: true
          exclude_assets: '.github,scripts,requirements.txt,README.md'
